<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://*.unity3d.com https://*.unity.com https://*.discord.com https://*.discordapp.com; connect-src 'self' https://*.unity3d.com https://*.unity.com wss://*.unity3d.com wss://://unity3d.com https://*.services.api.unity.com https://*.discord.com https://*.discordapp.com;">
    <style>
      html,
      :root {
        --sait: var(--discord-safe-area-inset-top, env(safe-area-inset-top));
        --saib: var(--discord-safe-area-inset-bottom, env(safe-area-inset-bottom));
        --sail: var(--discord-safe-area-inset-left, env(safe-area-inset-left));
        --sair: var(--discord-safe-area-inset-right, env(safe-area-inset-right));
      }
      body {
        margin: 0px;
        background-color: #000000;
        padding-top: var(--sait);
        padding-bottom: var(--saib);
        padding-left: var(--sail);
        padding-right: var(--sair);
        overflow: hidden;
      }
      canvas {
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        margin: auto;
        display: block;
        position: absolute;
      }
    </style>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>gametest</title>
  </head>
  <body style="text-align: center; border: 0; margin: 0;">
    <canvas id="unity-canvas" width=960 height=600 tabindex="-1" style="width: 100vw; height: 100vh; background: #000000"></canvas>
    <script type="importmap">
      {
        "imports": {
          "dso_bridge/": "./Bridge/",
          "dso_proxy_bridge/": "./.proxy/Bridge/"
        }
      }
    </script>
    <script type="module" src="app_loader.js"></script>
  </body>
</html>
